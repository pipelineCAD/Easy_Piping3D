
<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>
 <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
<script type="text/javascript">
  
  // Включаем Sandbox режим ОБЯЗАТЕЛЬНО
  //Paddle.Environment.set('sandbox'); 
//test_4979061abef2ae161cdb4215497 //для sanbox token
  
  Paddle.Initialize({ 
    token: 'live_bd3855bb5e43b17407875bfd9ec' 
  });

     const urlParams = new URLSearchParams(window.location.search);
    const txnId = urlParams.get('_ptxn');

    if (txnId) {
      console.log("Открываем транзакцию в Live:", txnId);
      
      Paddle.Checkout.open({
        transactionId: txnId,
        settings: {
          displayMode: 'inline',
          frameTarget: 'checkout-container', 
          frameInitialHeight: 450
        }
      });
    } else {
      console.error("ID транзакции не найден");
    }
  </script>
</head>
<body>
  <h1>Secure Checkout / After you fill the form please restart Autocad</h1>
  <div id="checkout-container"></div> </body>
</html>
